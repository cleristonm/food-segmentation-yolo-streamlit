services:

  postgres:
    image: postgres:16
    container_name: mlflow-postgres
    restart: always

    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow123
      POSTGRES_DB: mlflow_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data      
      - ./postgres:/docker-entrypoint-initdb.d

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: mlflow-server
    restart: always
    depends_on:
      - postgres
    ports:
      - "5000"
    volumes:
      - ./mlflow_data/artifacts:/mlflow/artifacts
    command: >
      mlflow server
      --backend-store-uri postgresql://mlflow:mlflow123@postgres:5432/mlflow_db
      --artifacts-destination file:///mlflow/artifacts
      --serve-artifacts
      --host 0.0.0.0
      --port 5000

  adminer:
    image: adminer
    container_name: mlflow-adminer
    restart: always
    depends_on:
      - postgres
    ports:
      - "8080:8080"

  nginx:
    image: nginx:latest
    container_name: mlflow-nginx
    restart: always
    depends_on:
      - mlflow
    ports:
      - "5000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd

volumes:
  postgres_data: {}


