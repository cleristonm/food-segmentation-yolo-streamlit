name: Publish Kaggle Notebook

on:
  push:
    branches:
      - main
    paths:
      - notebooks/train/**
      - notebooks/train_experiments/**

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v47

      - name: Publish train notebook
        if: contains(steps.changed.outputs.all_changed_files, 'notebooks/train/')
        run: |
          echo "Publishing notebooks/train"
          kaggle kernels push -p notebooks/train

      - name: Publish train_experiments notebook
        if: contains(steps.changed.outputs.all_changed_files, 'notebooks/train_experiments/')
        run: |
          echo "Publishing notebooks/train_experiments"
          kaggle kernels push -p notebooks/train_experiments