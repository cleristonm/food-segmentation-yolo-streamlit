name: Publish Kaggle Notebook

on:
  push:
    branches:
      - main
    paths:
      - notebooks/train.ipynb

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Run notebook 10 times
        run: |
          for i in {1..10}
          do
            echo "=============================="
            echo "Exécution $i/10"
            echo "=============================="

            kaggle kernels push -p notebooks/

            if [ $i -lt 10 ]; then
              echo "Attente de 20 minutes avant la prochaine exécution..."
              sleep 1200
            fi
          done